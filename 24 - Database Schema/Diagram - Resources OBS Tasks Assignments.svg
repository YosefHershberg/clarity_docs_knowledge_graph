<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 770" font-family="Segoe UI, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#777"/>
    </marker>
  </defs>

  <rect width="1120" height="770" fill="#fafafa"/>

  <text x="560" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="#222">
    Clarity 16.4.1 — Resources / OBS / Tasks / Assignments
  </text>
  <text x="560" y="46" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
    arrows point from FK column to PK table
  </text>

  <!-- ===== CMN_SEC_USERS ===== -->
  <g>
    <rect x="400" y="65" width="300" height="115" rx="6" fill="#fff5d6" stroke="#b08800" stroke-width="1.5"/>
    <rect x="400" y="65" width="300" height="22" rx="6" fill="#b08800"/>
    <text x="550" y="81" text-anchor="middle" fill="white" font-weight="bold">CMN_SEC_USERS</text>
    <text x="412" y="103" font-weight="bold">ID</text><text x="430" y="103">  (PK)</text>
    <text x="412" y="119">USER_NAME</text>
    <text x="412" y="135">FIRST_NAME, LAST_NAME</text>
    <text x="412" y="151">LAST_LOGIN_DATE</text>
    <text x="412" y="170" font-style="italic" fill="#888">stub — verify columns</text>
  </g>

  <!-- ===== SRM_RESOURCES ===== -->
  <g>
    <rect x="30" y="250" width="290" height="180" rx="6" fill="#dceaff" stroke="#1a4d99" stroke-width="1.5"/>
    <rect x="30" y="250" width="290" height="22" rx="6" fill="#1a4d99"/>
    <text x="175" y="266" text-anchor="middle" fill="white" font-weight="bold">SRM_RESOURCES</text>
    <text x="42" y="288" font-weight="bold">ID</text><text x="60" y="288">  (PK)</text>
    <text x="42" y="304">UNIQUE_NAME</text>
    <text x="42" y="320">FULL_NAME</text>
    <text x="42" y="336">USER_ID         → CMN_SEC_USERS</text>
    <text x="42" y="352">MANAGER_ID  → CMN_SEC_USERS</text>
    <text x="42" y="368">RESOURCE_TYPE</text>
    <text x="42" y="384">PERSON_TYPE</text>
    <text x="42" y="400">IS_ACTIVE</text>
    <text x="42" y="416">EMAIL, DATE_OF_HIRE</text>
  </g>

  <!-- ===== PRJ_OBS_UNITS ===== -->
  <g>
    <rect x="780" y="250" width="290" height="170" rx="6" fill="#e0f5e0" stroke="#2d7a2d" stroke-width="1.5"/>
    <rect x="780" y="250" width="290" height="22" rx="6" fill="#2d7a2d"/>
    <text x="925" y="266" text-anchor="middle" fill="white" font-weight="bold">PRJ_OBS_UNITS</text>
    <text x="792" y="288" font-weight="bold">ID</text><text x="810" y="288">  (PK)</text>
    <text x="792" y="304">TYPE_ID  → PRJ_OBS_TYPES</text>
    <text x="792" y="320">PARENT_ID  (self FK)</text>
    <text x="792" y="336">UNIQUE_NAME</text>
    <text x="792" y="352">NAME</text>
    <text x="792" y="368">DEPTH</text>
    <text x="792" y="384">CREATED_BY  → CMN_SEC_USERS</text>
  </g>

  <!-- ===== PRJ_OBS_ASSOCIATIONS ===== -->
  <g>
    <rect x="400" y="270" width="290" height="135" rx="6" fill="#f5e0f5" stroke="#7a2d7a" stroke-width="1.5"/>
    <rect x="400" y="270" width="290" height="22" rx="6" fill="#7a2d7a"/>
    <text x="545" y="286" text-anchor="middle" fill="white" font-weight="bold">PRJ_OBS_ASSOCIATIONS</text>
    <text x="412" y="308" font-weight="bold">ID</text><text x="430" y="308">  (PK)</text>
    <text x="412" y="324">UNIT_ID         → PRJ_OBS_UNITS</text>
    <text x="412" y="340">TABLE_NAME  (string)</text>
    <text x="412" y="356">RECORD_ID   (polymorphic)</text>
    <text x="412" y="378" font-style="italic" fill="#666">'SRM_RESOURCES' → SRM_RESOURCES.ID</text>
    <text x="412" y="394" font-style="italic" fill="#666">'PRTASK'              → PRTASK.PRID</text>
  </g>

  <!-- ===== PRTASK ===== -->
  <g>
    <rect x="80" y="490" width="290" height="210" rx="6" fill="#ffe5cc" stroke="#cc6600" stroke-width="1.5"/>
    <rect x="80" y="490" width="290" height="22" rx="6" fill="#cc6600"/>
    <text x="225" y="506" text-anchor="middle" fill="white" font-weight="bold">PRTASK</text>
    <text x="92" y="528" font-weight="bold">PRID</text><text x="124" y="528">  (PK)</text>
    <text x="92" y="544">PRPROJECTID  → INV_INVESTMENTS</text>
    <text x="92" y="560">PRNAME</text>
    <text x="92" y="576">PRWBSLEVEL</text>
    <text x="92" y="592">PRWBSSEQUENCE</text>
    <text x="92" y="608">PRISTASK   (1=detail, 0=summary)</text>
    <text x="92" y="624">PRSTATUS</text>
    <text x="92" y="640">PRPCTCOMPLETE</text>
    <text x="92" y="656">PRSTART, PRFINISH</text>
    <text x="92" y="672">CREATED_BY  → CMN_SEC_USERS</text>
    <text x="92" y="690" font-style="italic" fill="#666">no underscore after PR!</text>
  </g>

  <!-- ===== PRASSIGNMENT ===== -->
  <g>
    <rect x="420" y="490" width="290" height="200" rx="6" fill="#d6e5d6" stroke="#447744" stroke-width="1.5"/>
    <rect x="420" y="490" width="290" height="22" rx="6" fill="#447744"/>
    <text x="565" y="506" text-anchor="middle" fill="white" font-weight="bold">PRASSIGNMENT</text>
    <text x="432" y="528" font-weight="bold">PRID</text><text x="464" y="528">  (PK)</text>
    <text x="432" y="544">PRTASKID         → PRTASK.PRID</text>
    <text x="432" y="560">PRRESOURCEID  → SRM_RESOURCES</text>
    <text x="432" y="576">ROLE_ID                → SRM_RESOURCES</text>
    <text x="432" y="592">TEAM_ID               → PRTEAM</text>
    <text x="432" y="608">PRESTSUM   (estimate)</text>
    <text x="432" y="624">PRACTSUM   (actuals)</text>
    <text x="432" y="640">PRSTART, PRFINISH</text>
    <text x="432" y="656">PRSTATUS  (0/1/2)</text>
    <text x="432" y="672">CREATED_BY  → CMN_SEC_USERS</text>
  </g>

  <!-- ===== ODF_CA_TASK ===== -->
  <g>
    <rect x="760" y="490" width="290" height="120" rx="6" fill="#eaeaea" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="760" y="490" width="290" height="22" rx="6" fill="#555"/>
    <text x="905" y="506" text-anchor="middle" fill="white" font-weight="bold">ODF_CA_TASK</text>
    <text x="772" y="528" font-weight="bold">ID</text><text x="790" y="528">  (PK,  = PRTASK.PRID)</text>
    <text x="772" y="544">Z_CUSTOM_ATTR_1</text>
    <text x="772" y="560">Z_CUSTOM_ATTR_2</text>
    <text x="772" y="582" font-style="italic" fill="#666">off-screen — verify columns via</text>
    <text x="772" y="598" font-style="italic" fill="#666">INFORMATION_SCHEMA.COLUMNS</text>
  </g>

  <!-- ===== Relationship lines ===== -->

  <!-- SRM_RESOURCES.USER_ID/MANAGER_ID -> CMN_SEC_USERS -->
  <path d="M 200 250 Q 280 210 410 180" fill="none" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="220" y="220" font-size="11" fill="#333" font-weight="bold">USER_ID / MANAGER_ID</text>

  <!-- PRJ_OBS_UNITS.CREATED_BY -> CMN_SEC_USERS -->
  <path d="M 900 250 Q 800 210 690 180" fill="none" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="780" y="220" font-size="11" fill="#333" font-weight="bold">CREATED_BY</text>

  <!-- PRJ_OBS_ASSOCIATIONS.CREATED_BY -> CMN_SEC_USERS -->
  <path d="M 545 270 L 550 180" fill="none" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="555" y="225" font-size="11" fill="#333" font-weight="bold">CREATED_BY</text>

  <!-- PRJ_OBS_ASSOCIATIONS.UNIT_ID -> PRJ_OBS_UNITS -->
  <path d="M 690 320 L 780 320" fill="none" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="700" y="313" font-size="11" fill="#333" font-weight="bold">UNIT_ID</text>

  <!-- PRJ_OBS_UNITS self-loop (PARENT_ID) -->
  <path d="M 1070 290 C 1110 280 1110 330 1070 320" fill="none" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="1085" y="305" font-size="10" fill="#333" font-weight="bold">PARENT_ID</text>

  <!-- PRJ_OBS_ASSOCIATIONS.RECORD_ID -> SRM_RESOURCES (polymorphic, dashed) -->
  <path d="M 400 360 L 320 355" fill="none" stroke="#777" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrDash)"/>
  <text x="395" y="380" text-anchor="end" font-size="11" fill="#666">RECORD_ID</text>
  <text x="395" y="394" text-anchor="end" font-size="10" fill="#666">(when TABLE_NAME='SRM_RESOURCES')</text>

  <!-- PRASSIGNMENT.PRRESOURCEID -> SRM_RESOURCES -->
  <path d="M 460 490 Q 350 460 240 430" fill="none" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="280" y="450" font-size="11" fill="#333" font-weight="bold">PRRESOURCEID / ROLE_ID</text>

  <!-- PRASSIGNMENT.PRTASKID -> PRTASK -->
  <path d="M 420 580 L 370 580" fill="none" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="375" y="572" font-size="11" fill="#333" font-weight="bold">PRTASKID</text>

  <!-- ODF_CA_TASK -> PRTASK (1:0..1, ID = PRID) -->
  <path d="M 900 490 Q 600 450 370 510" fill="none" stroke="#333" stroke-width="1.6" stroke-dasharray="2 3" marker-end="url(#arr)"/>
  <text x="600" y="472" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">ID = PRID  (1 : 0..1)</text>

  <!-- Legend -->
  <g>
    <rect x="20" y="725" width="14" height="3" fill="#333"/>
    <text x="40" y="730" font-size="11">solid = FK (arrow → PK)</text>
    <line x1="200" y1="727" x2="218" y2="727" stroke="#777" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="225" y="731" font-size="11">dashed = polymorphic / 1:1 (off-schema)</text>
    <text x="500" y="731" font-size="11" font-style="italic" fill="#666">
      CMN_SEC_USERS &amp; ODF_CA_TASK are off-screen in the 16.4.1 dump
    </text>
  </g>
</svg>
